<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>承億文旅房價查詢</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --paper:#f6f3ec;
    --card:#ffffff;
    --ink:#23282d;
    --muted:#8b9097;
    --line:#e7e2d7;
    --pine:#14574f;
    --brass:#a9773f;
    --shadow:0 1px 2px rgba(35,40,45,.05), 0 8px 24px rgba(35,40,45,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Roboto,"Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{max-width:440px;margin:0 auto;padding:20px 18px 40px;min-height:100vh;}

  header{margin:6px 2px 18px;}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--pine);font-weight:700;}
  h1{font-size:22px;letter-spacing:-.01em;margin-top:6px;}
  h1 .sub{display:block;font-size:12.5px;font-weight:400;color:var(--muted);letter-spacing:0;margin-top:5px;}

  .fixed-bar{display:flex;flex-wrap:wrap;gap:6px;margin:0 2px 22px;}
  .fixed-bar .tag{font-size:12px;background:var(--pine);color:#fff;
    padding:6px 11px;border-radius:999px;font-weight:600;letter-spacing:.02em;}

  .field{margin-bottom:20px;}
  .field.is-hidden{display:none;}
  .field-label{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
  .field-label .t{font-size:14px;font-weight:600;}
  .field-label .hint{font-size:11px;color:var(--muted);}

  .seg{display:flex;gap:8px;flex-wrap:wrap;}
  .seg button{
    flex:1 1 0;min-width:calc(50% - 4px);appearance:none;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:13px 12px;border-radius:12px;font-size:14px;font-weight:500;
    transition:border-color .15s, background .15s, transform .05s;
  }
  .seg button:active{transform:scale(.985);}
  .seg button[aria-pressed="true"]{
    border-color:var(--pine);background:var(--pine);color:#fff;font-weight:600;
    box-shadow:0 4px 12px rgba(20,87,79,.22);
  }

  .stack{display:flex;flex-direction:column;gap:8px;}
  .stack button{
    width:100%;text-align:left;appearance:none;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:14px 15px;border-radius:12px;font-size:14.5px;font-weight:500;
    transition:border-color .15s, background .15s, transform .05s;
  }
  .stack button:active{transform:scale(.99);}
  .stack button[aria-pressed="true"]{
    border-color:var(--pine);background:var(--pine);color:#fff;font-weight:600;
    box-shadow:0 4px 12px rgba(20,87,79,.22);
  }

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .grid button{
    appearance:none;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:13px 12px;border-radius:12px;font-size:14px;font-weight:500;
    transition:border-color .15s, background .15s, transform .05s;
  }
  .grid button:active{transform:scale(.985);}
  .grid button[aria-pressed="true"]{
    border-color:var(--pine);background:var(--pine);color:#fff;font-weight:600;
    box-shadow:0 4px 12px rgba(20,87,79,.22);
  }

  input[type="date"]{
    width:100%;max-width:100%;-webkit-appearance:none;appearance:none;
    border:1px solid var(--line);background:var(--card);
    padding:13px 14px;border-radius:12px;font-size:15px;color:var(--ink);
    font-family:inherit;display:block;min-height:50px;
  }
  input[type="date"]:focus{outline:none;border-color:var(--pine);}

  .cta{
    width:100%;margin-top:8px;appearance:none;cursor:pointer;border:none;
    background:var(--pine);color:#fff;padding:16px;border-radius:14px;
    font-size:15.5px;font-weight:700;letter-spacing:.02em;
    box-shadow:0 6px 18px rgba(20,87,79,.28);transition:opacity .15s, transform .05s;
  }
  .cta:disabled{opacity:.4;box-shadow:none;cursor:not-allowed;}
  .cta:not(:disabled):active{transform:translateY(1px);}

  .result{margin-top:24px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;box-shadow:var(--shadow);overflow:hidden;
    opacity:0;transform:translateY(8px);transition:opacity .3s, transform .3s;}
  .result.show{opacity:1;transform:none;}
  .result-top{padding:22px 22px 16px;border-bottom:1px dashed var(--line);}
  .result-top .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .price{font-family:Georgia,"Times New Roman",serif;font-size:44px;font-weight:700;
    color:var(--brass);letter-spacing:-.02em;margin-top:6px;line-height:1;}
  .price small{font-size:16px;font-weight:600;color:var(--brass);margin-right:4px;font-family:inherit;}
  .price .unit{font-size:13px;color:var(--muted);font-family:inherit;font-weight:500;margin-left:6px;}
  .price.novalue{font-family:inherit;font-size:20px;color:var(--muted);}
  .result-meta{padding:14px 22px 20px;display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-size:12px;background:var(--paper);border:1px solid var(--line);color:#4a5058;padding:5px 10px;border-radius:999px;}

  .prof{margin-top:16px;font-size:11px;color:var(--muted);text-align:center;}
</style>
</head>
<body>
  <header>
    <div class="eyebrow">Rate Finder</div>
    <h1>承億文旅房價查詢工具
      <span class="sub" id="greeting">此工具僅限承億文旅員工使用/n選擇條件，查出對應房價</span>
    </h1>
  </header>

  <!-- 館別（目前僅開放桃城茶樣子，其餘館建好表格後移除註解即可） -->
  <div class="field" data-key="branch">
    <div class="field-label"><span class="t">館別</span></div>
    <div class="seg">
      <button data-val="桃城">桃城茶樣子</button>
      <button data-val="淡水">淡水吹風</button>
      <button data-val="花蓮">花蓮山知道</button>
      <button data-val="潭日月">潭日月</button>
      <!-- <button data-val="小承">小承輕旅</button> -->
    </div>
  </div>

  <!-- 入住類別 -->
  <div class="field" data-key="category">
    <div class="field-label"><span class="t">入住類別</span></div>
    <div class="seg">
      <button data-val="散客">散客</button>
      <button data-val="商務">商務客</button>
      <button data-val="團散">團散</button>
      <button data-val="團體">團體</button>
      <button data-val="票券">票券</button>
    </div>
  </div>

  <!-- 票種（僅票券顯示） -->
  <div class="field is-hidden" data-key="ticket" id="ticketField">
    <div class="field-label"><span class="t">票種</span><span class="hint">僅票券適用</span></div>
    <div class="seg">
      <button data-val="B2">B2</button>
      <button data-val="B15">B15</button>
    </div>
  </div>

  <!-- 日期 -->
  <div class="field">
    <div class="field-label"><span class="t">入住日期</span></div>
    <input type="date" id="dateInput">
  </div>

  <!-- 住房率（僅散客顯示） -->
  <div class="field is-hidden" data-key="occ" id="occField">
    <div class="field-label"><span class="t">住房率</span>
      <span class="hint">僅散客適用</span></div>
    <div class="grid">
      <button data-val="30%以下">30%以下</button>
      <button data-val="31%-50%">31%-50%</button>
      <button data-val="51%-70%">51%-70%</button>
      <button data-val="70%以上">70%以上</button>
    </div>
  </div>

  <!-- 房型（選完館別後動態載入） -->
  <div class="field is-hidden" data-key="room" id="roomField">
    <div class="field-label"><span class="t">房型</span><span class="hint" id="roomHint"></span></div>
    <div class="stack" id="roomStack"></div>
  </div>

  <button class="cta" id="queryBtn" disabled>查詢房價</button>

  <div class="result" id="result">
    <div class="result-top">
      <div class="lbl">查詢結果</div>
      <div class="price" id="priceOut">—</div>
    </div>
    <div class="result-meta" id="resultMeta"></div>
  </div>

  <div class="prof" id="profileHint"></div>

<script>
  
/* 房型對照表：新增館別或調整房型，改這裡即可（順序即顯示順序） */
const ROOMS = {
  '桃城': ['穀雨標準雙人房','白露行政雙人房','夏至標準四人房','小雪行政四人房','歲時紀獨賣套房'],
  '淡水': ['水鳥標準雙人房','藍天雅緻雙人房','紅樹經典雙人房','水鳥標準三人房','左/右岸家庭四人房'],
  '花蓮': ['台灣白標準雙人房','草玉行政雙人房','黑膽石標準三人房','綠蛇紋標準四人房','墨玉行政四人房','豐田玉獨賣套房'],
  '潭日月': ['樂山標準雙人房','仁山行政雙人房','仁水行政雙人房','樂山標準家庭房','知水行政家庭房','樂水行政家庭房','樂水靜心家庭房','方山水獨賣套房'],
  // '小承': ['背包床位','單人雅房','雙人雅房','雙人套房','四人套房'],
};
  
const state = { branch:null, category:null, ticket:null, date:null, room:null, occ:null };

/* 分段/直列按鈕：單選 */
document.querySelectorAll('.field[data-key]').forEach(field=>{
  const key = field.dataset.key;
  field.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      field.querySelectorAll('button').forEach(b=>b.setAttribute('aria-pressed','false'));
      btn.setAttribute('aria-pressed','true');
      state[key] = btn.dataset.val;
      if(key==='branch') onBranchChange();
      if(key==='category') applyCategoryChange();
      refresh();
    });
  });
});
document.getElementById('dateInput').addEventListener('change', e=>{
  state.date = e.target.value; refresh();
});

/* 住房率連動：只有散客顯示 */
function onBranchChange(){
  state.room = null;
  const field=document.getElementById('roomField');
  const stack=document.getElementById('roomStack');
  const hint=document.getElementById('roomHint');
  field.classList.remove('is-hidden');
  const rooms = ROOMS[state.branch] || [];
  if(rooms.length){
    hint.textContent='';
    stack.innerHTML = rooms.map(r=>'<button data-val="'+r+'">'+r+'</button>').join('');
    stack.querySelectorAll('button').forEach(btn=>{
      btn.addEventListener('click',()=>{
        stack.querySelectorAll('button').forEach(b=>b.setAttribute('aria-pressed','false'));
        btn.setAttribute('aria-pressed','true');
        state.room=btn.dataset.val; refresh();
      });
    });
  }else{
    hint.textContent='此館尚無房型資料';
    stack.innerHTML='';
  }
  refresh();
}

function applyCategoryChange(){
  // 住房率：僅散客
  const isGuest = (state.category === '散客');
  const occ = document.getElementById('occField');
  occ.classList.toggle('is-hidden', !isGuest);
  if(!isGuest){ state.occ=null; occ.querySelectorAll('button').forEach(b=>b.setAttribute('aria-pressed','false')); }
  // 票種：僅票券
  const isTicket = (state.category === '票券');
  const tk = document.getElementById('ticketField');
  tk.classList.toggle('is-hidden', !isTicket);
  if(!isTicket){ state.ticket=null; tk.querySelectorAll('button').forEach(b=>b.setAttribute('aria-pressed','false')); }
}

/* 完成判斷：散客要選住房率，其他不用 */
function isComplete(){
  if(!state.branch || !state.category || !state.date || !state.room) return false;
  if(state.category === '散客' && !state.occ) return false;
  if(state.category === '票券' && !state.ticket) return false;
  return true;
}
function refresh(){ document.getElementById('queryBtn').disabled = !isComplete(); }

document.getElementById('queryBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('queryBtn');
  btn.disabled = true; btn.textContent = '查詢中…';
  try{
    const realCategory = (state.category === '票券') ? ('票券' + state.ticket) : state.category;
    const payload = {
      branch: state.branch,
      category: realCategory,         // 散客 / 商務 / 票券B2 / 票券B15
      date: state.date,
      roomType: state.room,
      occupancy: state.occ || '',
      userId: window._userId || ''      // ← 加這行，送出使用者 UID
    };
    const data = await fetchFromGAS(payload);
    if(data && data.ok){
      renderResult(data.price, data.dateType, state.category === '票券');
    }else{
      renderResult(null, null);
    }
  }catch(err){
    if(err.name === 'AbortError'){
      alert('查詢逾時，請稍後再試一次');
    }else{
      alert('查詢失敗，請稍後再試');
    }
  }finally{
    btn.disabled = false; btn.textContent = '查詢房價';
  }
});

async function fetchFromGAS(s){
  const url = 'https://script.google.com/macros/s/AKfycbwN8s2rpKF_Hvjtg7ir2zaJN2uEDEBAWbB9HN03vLwxlbvtOKRbO7EukhQa3W1IwJE/exec';
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), 12000);   // 12 秒上限
  try{
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify(s),
      signal: controller.signal
    });
    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}

function renderResult(price, dateType, isTicket){
  const box = document.getElementById('result');
  const out = document.getElementById('priceOut');
  if(price==null){
    out.className = 'price novalue';
    out.textContent = '查無對應房價';
  }else{
    out.className = 'price';
    const n = Number(price).toLocaleString();
    out.innerHTML = isTicket
      ? '<small>+NT$</small>' + n + '<span class="unit">／晚</span>'
      : '<small>NT$</small>' + n + '<span class="unit">／晚</span>';
  }
  let catLabel = state.category === '商務' ? '商務客' : state.category;
  if(state.category === '票券' && state.ticket) catLabel = '票券' + state.ticket;
  const BRANCH_LABEL = {'桃城':'桃城茶樣子','淡水':'淡水吹風','花蓮':'花蓮山知道','潭日月':'潭日月', '小承':'小承輕旅'};
  const parts = [BRANCH_LABEL[state.branch]||state.branch, catLabel, state.date, state.room, state.occ];
  if(dateType) parts.push(dateType);
  document.getElementById('resultMeta').innerHTML =
    parts.filter(Boolean).map(p=>'<span class="chip">'+p+'</span>').join('');
  box.classList.add('show');
  box.scrollIntoView({behavior:'smooth', block:'nearest'});
}

(async function initLiff(){
  try{
    if(typeof liff==='undefined') return;
    await liff.init({ liffId:'2010574465-zTVFPGxP' });

    // 沒登入就主動觸發 LINE 登入
    if(!liff.isLoggedIn()){
      liff.login();      // 會跳 LINE 登入，登入後自動導回本頁
      return;            // 導轉中，先停住
    }

    // 到這裡代表已登入，拿得到 UID
    const p = await liff.getProfile();
    document.getElementById('greeting').textContent = p.displayName + '，選擇條件即可查房價';
    window._userId = p.userId;   // 存起來，之後白名單查詢要送這個
    document.getElementById('profileHint').textContent = 'UID：' + p.userId;
  }catch(e){ /* 保底 */ }
})();
