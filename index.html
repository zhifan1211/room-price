<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>房價查詢｜桃城茶樣子</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --paper:#f6f3ec;
    --card:#ffffff;
    --ink:#23282d;
    --muted:#8b9097;
    --line:#e7e2d7;
    --pine:#14574f;
    --brass:#a9773f;
    --shadow:0 1px 2px rgba(35,40,45,.05), 0 8px 24px rgba(35,40,45,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Roboto,"Helvetica Neue",sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{max-width:440px;margin:0 auto;padding:20px 18px 40px;min-height:100vh;}

  header{margin:6px 2px 18px;}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--pine);font-weight:700;}
  h1{font-size:22px;letter-spacing:-.01em;margin-top:6px;}
  h1 .sub{display:block;font-size:12.5px;font-weight:400;color:var(--muted);letter-spacing:0;margin-top:5px;}

  /* 固定條件列 */
  .fixed-bar{display:flex;flex-wrap:wrap;gap:6px;margin:0 2px 22px;}
  .fixed-bar .tag{font-size:12px;background:var(--pine);color:#fff;
    padding:6px 11px;border-radius:999px;font-weight:600;letter-spacing:.02em;}
  .fixed-bar .tag.ghost{background:transparent;color:var(--pine);border:1px solid var(--pine);font-weight:500;}

  .field{margin-bottom:20px;}
  .field-label{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
  .field-label .t{font-size:14px;font-weight:600;}
  .field-label .hint{font-size:11px;color:var(--muted);}

  /* 房型：整寬直列 */
  .stack{display:flex;flex-direction:column;gap:8px;}
  .stack button{
    width:100%;text-align:left;appearance:none;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:14px 15px;border-radius:12px;font-size:14.5px;font-weight:500;
    transition:border-color .15s, background .15s, transform .05s;
  }
  .stack button:active{transform:scale(.99);}
  .stack button[aria-pressed="true"]{
    border-color:var(--pine);background:var(--pine);color:#fff;font-weight:600;
    box-shadow:0 4px 12px rgba(20,87,79,.22);
  }

  /* 住房率：2x2 */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .grid button{
    appearance:none;cursor:pointer;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:13px 12px;border-radius:12px;font-size:14px;font-weight:500;
    transition:border-color .15s, background .15s, transform .05s;
  }
  .grid button:active{transform:scale(.985);}
  .grid button[aria-pressed="true"]{
    border-color:var(--pine);background:var(--pine);color:#fff;font-weight:600;
    box-shadow:0 4px 12px rgba(20,87,79,.22);
  }

  input[type="date"]{
    width:100%;border:1px solid var(--line);background:var(--card);
    padding:13px 14px;border-radius:12px;font-size:15px;color:var(--ink);font-family:inherit;
  }
  input[type="date"]:focus{outline:none;border-color:var(--pine);}

  .cta{
    width:100%;margin-top:8px;appearance:none;cursor:pointer;border:none;
    background:var(--pine);color:#fff;padding:16px;border-radius:14px;
    font-size:15.5px;font-weight:700;letter-spacing:.02em;
    box-shadow:0 6px 18px rgba(20,87,79,.28);transition:opacity .15s, transform .05s;
  }
  .cta:disabled{opacity:.4;box-shadow:none;cursor:not-allowed;}
  .cta:not(:disabled):active{transform:translateY(1px);}

  .result{margin-top:24px;background:var(--card);border:1px solid var(--line);
    border-radius:18px;box-shadow:var(--shadow);overflow:hidden;
    opacity:0;transform:translateY(8px);transition:opacity .3s, transform .3s;}
  .result.show{opacity:1;transform:none;}
  .result-top{padding:22px 22px 16px;border-bottom:1px dashed var(--line);}
  .result-top .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .price{font-family:Georgia,"Times New Roman",serif;font-size:44px;font-weight:700;
    color:var(--brass);letter-spacing:-.02em;margin-top:6px;line-height:1;}
  .price small{font-size:16px;font-weight:600;color:var(--brass);margin-right:4px;font-family:inherit;}
  .price .unit{font-size:13px;color:var(--muted);font-family:inherit;font-weight:500;margin-left:6px;}
  .price.novalue{font-family:inherit;font-size:20px;color:var(--muted);}
  .result-meta{padding:14px 22px 20px;display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-size:12px;background:var(--paper);border:1px solid var(--line);color:#4a5058;padding:5px 10px;border-radius:999px;}

  .prof{margin-top:16px;font-size:11px;color:var(--muted);text-align:center;}
</style>
</head>
<body>
  <header>
    <div class="eyebrow">Rate Finder</div>
    <h1>房價查詢
      <span class="sub" id="greeting">選擇日期與房型，查出對應房價</span>
    </h1>
  </header>

  <!-- 固定條件（此版本鎖定桃城茶樣子・一般入住・常客） -->
  <div class="fixed-bar">
    <span class="tag">桃城茶樣子</span>
    <span class="tag ghost">一般入住</span>
    <span class="tag ghost">常客</span>
  </div>

  <!-- 日期 -->
  <div class="field">
    <div class="field-label"><span class="t">入住日期</span></div>
    <input type="date" id="dateInput">
  </div>

  <!-- 房型 -->
  <div class="field" data-key="room">
    <div class="field-label"><span class="t">房型</span></div>
    <div class="stack">
      <button data-val="穀雨標準雙人房">穀雨標準雙人房</button>
      <button data-val="白露行政雙人房">白露行政雙人房</button>
      <button data-val="夏至標準四人房">夏至標準四人房</button>
      <button data-val="小雪行政四人房">小雪行政四人房</button>
      <button data-val="歲時紀獨賣套房">歲時紀獨賣套房</button>
    </div>
  </div>

  <!-- 住房率 -->
  <div class="field" data-key="occ">
    <div class="field-label"><span class="t">住房率</span>
      <span class="hint">目前請自行選擇</span></div>
    <div class="grid">
      <button data-val="30%以下">30%以下</button>
      <button data-val="31%-50%">31%-50%</button>
      <button data-val="51%-70%">51%-70%</button>
      <button data-val="70%以上">70%以上</button>
    </div>
  </div>

  <button class="cta" id="queryBtn" disabled>查詢房價</button>

  <div class="result" id="result">
    <div class="result-top">
      <div class="lbl">查詢結果</div>
      <div class="price" id="priceOut">—</div>
    </div>
    <div class="result-meta" id="resultMeta"></div>
  </div>

  <div class="prof" id="profileHint"></div>

<script>
/* =========================================================
   狀態：只有日期、房型、住房率由使用者選
========================================================= */
const state = { date:null, room:null, occ:null };

/* 固定條件（此版本鎖定，未來擴充改這裡即可） */
const FIXED = { branch:'桃城', stay:'一般入住', guest:'常客' };

/* 分段按鈕：單選 */
document.querySelectorAll('.field[data-key]').forEach(field=>{
  const key = field.dataset.key;
  field.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      field.querySelectorAll('button').forEach(b=>b.setAttribute('aria-pressed','false'));
      btn.setAttribute('aria-pressed','true');
      state[key] = btn.dataset.val;
      refresh();
    });
  });
});
document.getElementById('dateInput').addEventListener('change', e=>{
  state.date = e.target.value; refresh();
});

function isComplete(){ return state.date && state.room && state.occ; }
function refresh(){ document.getElementById('queryBtn').disabled = !isComplete(); }

/* =========================================================
   查詢：呼叫 GAS
========================================================= */
document.getElementById('queryBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('queryBtn');
  btn.disabled = true; btn.textContent = '查詢中…';
  try{
    const payload = {
      branch: FIXED.branch,       // 送 '桃城'（對齊 Sheet），畫面顯示才是全名
      stay: FIXED.stay,
      guest: FIXED.guest,
      date: state.date,
      roomType: state.room,
      occupancy: state.occ
    };
    const data = await fetchFromGAS(payload);
    if(data && data.ok){
      renderResult(data.price, data.dateType);
    }else{
      renderResult(null, null);
    }
  }catch(err){
    alert('查詢失敗，請稍後再試');
  }finally{
    btn.disabled = false; btn.textContent = '查詢房價';
  }
});

async function fetchFromGAS(s){
  const url = 'https://script.google.com/macros/s/AKfycbwfLlAeBZ9J-_h0nOZSUEoI1dL7SG6A93PrEmT5Nz8MVtuaGxfw0mYwDpgbIKT6r7w/exec';
  const res = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(s)
  });
  const data = await res.json();      // 後端回傳 { ok, price, dateType }
  return data;
}

function renderResult(price, dateType){
  const box = document.getElementById('result');
  const out = document.getElementById('priceOut');
  if(price==null){
    out.className = 'price novalue';
    out.textContent = '查無對應房價';
  }else{
    out.className = 'price';
    out.innerHTML = `<small>NT$</small>${Number(price).toLocaleString()}<span class="unit">／晚</span>`;
  }
  const parts = ['桃城茶樣子', state.date, state.room, state.occ];
  if(dateType) parts.push(dateType);   // 顯示「這天算哪種日期定義」
  document.getElementById('resultMeta').innerHTML =
    parts.filter(Boolean).map(p=>`<span class="chip">${p}</span>`).join('');
  box.classList.add('show');
  box.scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* =========================================================
   LIFF 初始化
========================================================= */
(async function initLiff(){
  try{
    if(typeof liff==='undefined') return;
    await liff.init({ liffId:'2010574465-zTVFPGxP' });
    if(liff.isLoggedIn()){
      const p = await liff.getProfile();
      document.getElementById('greeting').textContent = `${p.displayName}，選擇日期與房型即可查房價`;
    }
  }catch(e){ /* 非 LINE 環境維持一般網頁 */ }
})();
</script>
</body>
</html>
